<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E ✦ M · Our Day</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f8f6f3;
      --white: #ffffff;
      --gold: #c9a87c;
      --gold-light: #f2ebe0;
      --ink: #1a1714;
      --ink-mid: #5a5149;
      --ink-soft: #a09080;
      --border: #e8e0d8;
      --shadow-card: 0 2px 16px rgba(0,0,0,0.055);
      --shadow-hover: 0 16px 40px rgba(0,0,0,0.11);
      --radius-card: 20px;
      --radius-pill: 100px;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(248,246,243,0.88);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      padding: 18px 40px;
    }
    .header-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between; gap: 20px;
    }
    .header-left { display: flex; align-items: center; gap: 20px; }
    .monogram {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px; letter-spacing: 0.22em; color: var(--gold);
    }
    .site-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 30px; font-weight: 300; line-height: 1;
    }
    .site-date { font-size: 11px; color: var(--ink-soft); letter-spacing: 0.08em; margin-top: 4px; }

    .btn-primary {
      background: var(--ink); color: var(--white); border: none;
      border-radius: var(--radius-pill); padding: 11px 24px;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
      cursor: pointer; letter-spacing: 0.02em;
      transition: opacity 0.2s, transform 0.15s;
      white-space: nowrap; display: none;
    }
    .btn-primary:hover { opacity: 0.85; transform: scale(1.02); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .btn-primary.visible { display: block; }

    #key-banner {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 14px 40px;
    }
    .key-banner-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .key-label { font-size: 12px; color: var(--ink-soft); letter-spacing: 0.04em; white-space: nowrap; }
    #api-key-input {
      flex: 1; min-width: 260px;
      border: 1.5px solid var(--border); border-radius: var(--radius-pill);
      padding: 9px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px;
      background: var(--cream); color: var(--ink); outline: none;
      transition: border-color 0.2s;
    }
    #api-key-input:focus { border-color: var(--gold); }
    .key-hint { font-size: 11px; color: var(--ink-soft); }
    .key-hint a { color: var(--gold); text-decoration: none; }
    .key-hint a:hover { text-decoration: underline; }

    #drop-page {
      display: flex; align-items: center; justify-content: center;
      min-height: calc(100vh - 140px); padding: 40px;
    }
    #dropzone {
      background: var(--white); border: 2px dashed var(--border);
      border-radius: 28px; padding: 80px 60px; text-align: center;
      cursor: pointer; max-width: 520px; width: 100%;
      transition: all 0.22s ease; user-select: none;
    }
    #dropzone:hover, #dropzone.drag-over {
      border-color: var(--gold); background: #fdf9f5; transform: scale(1.012);
    }
    .drop-orb {
      width: 68px; height: 68px; border-radius: 50%;
      background: var(--gold-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; color: var(--gold); margin: 0 auto 24px;
      transition: transform 0.3s ease;
    }
    #dropzone:hover .drop-orb { transform: translateY(-3px); }
    .drop-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px; font-weight: 300; margin-bottom: 10px;
    }
    .drop-hint { font-size: 13px; color: var(--ink-soft); line-height: 1.6; }

    #gallery-wrap { display: none; max-width: 1200px; margin: 0 auto; padding: 0 40px 80px; }
    .toolbar { display: flex; align-items: center; gap: 12px; padding: 24px 0 20px; }
    .btn-ghost {
      background: var(--white); color: var(--ink-mid);
      border: 1.5px solid var(--border); border-radius: var(--radius-pill);
      padding: 9px 18px; font-family: 'DM Sans', sans-serif; font-size: 13px;
      cursor: pointer; transition: border-color 0.2s, color 0.2s;
    }
    .btn-ghost:hover { border-color: var(--gold); color: var(--ink); }
    .photo-count { font-size: 13px; color: var(--ink-soft); margin-left: auto; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 22px; }

    .card {
      background: var(--white); border-radius: var(--radius-card);
      overflow: hidden; box-shadow: var(--shadow-card);
      animation: riseIn 0.5s cubic-bezier(.22,1,.36,1) both;
      transition: transform 0.3s cubic-bezier(.22,1,.36,1), box-shadow 0.3s ease;
    }
    .card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); }

    .img-wrap {
      position: relative; aspect-ratio: 4/3;
      overflow: hidden; background: #ede7df; cursor: pointer;
    }
    .img-wrap img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform 0.4s ease;
    }
    .card:hover .img-wrap img { transform: scale(1.03); }
    .img-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.07); opacity: 0; transition: opacity 0.25s;
    }
    .card:hover .img-overlay { opacity: 1; }
    .remove-btn {
      position: absolute; top: 10px; right: 10px;
      background: rgba(0,0,0,0.52); color: #fff; border: none;
      border-radius: 50%; width: 30px; height: 30px;
      font-size: 18px; line-height: 30px; text-align: center;
      cursor: pointer; opacity: 0; transition: opacity 0.2s;
    }
    .card:hover .remove-btn { opacity: 1; }
    .view-hint {
      position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.48); color: #fff;
      font-size: 11px; letter-spacing: 0.06em;
      padding: 5px 12px; border-radius: 100px;
      opacity: 0; transition: opacity 0.2s;
      white-space: nowrap; pointer-events: none;
    }
    .card:hover .view-hint { opacity: 1; }

    .card-body { padding: 16px 18px 20px; }
    .caption-btn {
      width: 100%; background: var(--gold-light); border: none;
      border-radius: var(--radius-pill); padding: 11px 0;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
      color: #6a4828; cursor: pointer; transition: background 0.2s, transform 0.15s;
    }
    .caption-btn:hover { background: #ecdfc9; transform: scale(1.01); }

    .loader-row { display: flex; gap: 7px; justify-content: center; align-items: center; padding: 10px 0; }
    .dot {
      display: inline-block; width: 7px; height: 7px;
      background: var(--gold); border-radius: 50%;
      animation: pulse 1.1s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }

    .caption-area { animation: fadeUp 0.4s ease both; }
    .caption-tag {
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 9px;
    }
    .caption-text {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 16px; line-height: 1.7; color: #2a2016;
    }
    .regen-btn {
      margin-top: 13px; background: none; border: none;
      font-family: 'DM Sans', sans-serif; font-size: 12px;
      color: var(--ink-soft); cursor: pointer; padding: 0;
      transition: color 0.2s;
    }
    .regen-btn:hover { color: var(--gold); }
    .err-text { font-size: 13px; color: #c0654a; margin-bottom: 9px; }

    #lightbox {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(20,16,12,0.92); backdrop-filter: blur(8px);
      align-items: center; justify-content: center; padding: 20px;
    }
    #lightbox.open { display: flex; animation: fadeIn 0.25s ease; }
    .lb-inner {
      position: relative; max-width: 900px; width: 100%;
      display: flex; flex-direction: column; align-items: center; gap: 20px;
    }
    .lb-img-wrap { border-radius: 16px; overflow: hidden; max-height: 70vh; display: flex; }
    .lb-img-wrap img { max-width: 100%; max-height: 70vh; object-fit: contain; display: block; border-radius: 16px; }
    .lb-caption {
      font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 18px;
      color: rgba(255,255,255,0.88); text-align: center; line-height: 1.7; max-width: 600px;
    }
    .lb-close {
      position: absolute; top: -14px; right: -14px;
      background: rgba(255,255,255,0.12); color: #fff; border: none;
      border-radius: 50%; width: 36px; height: 36px; font-size: 20px;
      cursor: pointer; transition: background 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .lb-close:hover { background: rgba(255,255,255,0.22); }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(7px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pulse {
      0%, 100% { transform: scale(0.5); opacity: 0.3; }
      50%       { transform: scale(1);   opacity: 1;   }
    }

    @media (max-width: 640px) {
      header { padding: 16px 20px; }
      .site-title { font-size: 24px; }
      #drop-page { padding: 24px; }
      #dropzone { padding: 60px 30px; }
      #gallery-wrap { padding: 0 20px 60px; }
      .grid { grid-template-columns: 1fr; }
      #key-banner { padding: 12px 20px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="header-left">
        <span class="monogram">E ✦ M</span>
        <div>
          <h1 class="site-title">Our Day</h1>
          <p class="site-date">October 11, 2025</p>
        </div>
      </div>
      <button class="btn-primary" id="caption-all-btn">✦ Caption all</button>
    </div>
  </header>

  <div id="key-banner">
    <div class="key-banner-inner">
      <span class="key-label">Gemini API key</span>
      <input type="password" id="api-key-input" placeholder="AIza…" autocomplete="off" spellcheck="false" />
      <span class="key-hint">Free at <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com</a> · saved only in your browser, never transmitted anywhere else</span>
    </div>
  </div>

  <div id="drop-page">
    <div id="dropzone">
      <input type="file" id="file-input" accept="image/*" multiple style="display:none" />
      <div class="drop-orb">↑</div>
      <p class="drop-heading">Drop your photos here</p>
      <p class="drop-hint">or click to browse &nbsp;·&nbsp; jpg, png, heic, webp</p>
    </div>
  </div>

  <div id="gallery-wrap">
    <div class="toolbar">
      <button class="btn-ghost" id="add-more-btn">+ Add photos</button>
      <span class="photo-count" id="photo-count"></span>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <div id="lightbox">
    <div class="lb-inner">
      <button class="lb-close" id="lb-close">×</button>
      <div class="lb-img-wrap"><img id="lb-img" src="" alt="" /></div>
      <p class="lb-caption" id="lb-caption"></p>
    </div>
  </div>

  <script>
    const photos = [];
    let generatingAll = false;

    const dropPage      = document.getElementById('drop-page');
    const dropzone      = document.getElementById('dropzone');
    const fileInput     = document.getElementById('file-input');
    const galleryWrap   = document.getElementById('gallery-wrap');
    const grid          = document.getElementById('grid');
    const photoCount    = document.getElementById('photo-count');
    const captionAllBtn = document.getElementById('caption-all-btn');
    const addMoreBtn    = document.getElementById('add-more-btn');
    const apiKeyInput   = document.getElementById('api-key-input');
    const lightbox      = document.getElementById('lightbox');
    const lbImg         = document.getElementById('lb-img');
    const lbCaption     = document.getElementById('lb-caption');
    const lbClose       = document.getElementById('lb-close');

    apiKeyInput.value = localStorage.getItem('em_gemini_key') || '';
    apiKeyInput.addEventListener('input', () => localStorage.setItem('em_gemini_key', apiKeyInput.value.trim()));

    function toBase64(file) {
      return new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result.split(',')[1]);
        r.onerror = rej;
        r.readAsDataURL(file);
      });
    }

    async function addFiles(files) {
      const imgs = Array.from(files).filter(f => f.type.startsWith('image/'));
      for (const file of imgs) {
        const id     = Math.random().toString(36).slice(2);
        const url    = URL.createObjectURL(file);
        const base64 = await toBase64(file);
        const photo  = { id, url, base64, mimeType: file.type, caption: null, loading: false, error: null };
        photos.push(photo);
        renderCard(photo, photos.length - 1);
      }
      updateUI();
    }

    function updateUI() {
      const has = photos.length > 0;
      dropPage.style.display    = has ? 'none' : 'flex';
      galleryWrap.style.display = has ? 'block' : 'none';
      photoCount.textContent    = `${photos.length} photo${photos.length !== 1 ? 's' : ''}`;
      captionAllBtn.classList.toggle('visible', has);
    }

    function renderCard(photo, index) {
      const card = document.createElement('div');
      card.className = 'card';
      card.id = `card-${photo.id}`;
      card.style.animationDelay = `${index * 0.04}s`;
      card.innerHTML = `
        <div class="img-wrap">
          <img src="${photo.url}" alt="" loading="lazy" />
          <div class="img-overlay"></div>
          <button class="remove-btn" title="Remove">×</button>
          <span class="view-hint">click to enlarge</span>
        </div>
        <div class="card-body" id="body-${photo.id}">
          <button class="caption-btn">✦ Generate caption</button>
        </div>`;
      grid.appendChild(card);

      card.querySelector('.img-wrap').addEventListener('click', (e) => {
        if (e.target.classList.contains('remove-btn')) return;
        openLightbox(photo);
      });
      card.querySelector('.remove-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        removePhoto(photo.id);
      });
      card.querySelector('.caption-btn').addEventListener('click', () => generateCaption(photo.id));
    }

    function setCardBody(photoId, html) {
      const body = document.getElementById(`body-${photoId}`);
      if (!body) return;
      body.innerHTML = html;
      body.querySelector('.regen-btn')?.addEventListener('click', () => generateCaption(photoId));
      body.querySelector('.caption-btn')?.addEventListener('click', () => generateCaption(photoId));
    }

    function removePhoto(id) {
      const idx = photos.findIndex(p => p.id === id);
      if (idx !== -1) photos.splice(idx, 1);
      const card = document.getElementById(`card-${id}`);
      if (card) {
        card.style.transition = 'opacity 0.2s, transform 0.2s';
        card.style.opacity = '0'; card.style.transform = 'scale(0.95)';
        setTimeout(() => card.remove(), 220);
      }
      updateUI();
    }

    function openLightbox(photo) {
      lbImg.src = photo.url;
      lbCaption.textContent = photo.caption || '';
      lbCaption.style.display = photo.caption ? 'block' : 'none';
      lightbox.classList.add('open');
    }
    lbClose.addEventListener('click', () => lightbox.classList.remove('open'));
    lightbox.addEventListener('click', (e) => { if (e.target === lightbox) lightbox.classList.remove('open'); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') lightbox.classList.remove('open'); });

    const PROMPT = `You are a mischievous archivist cataloguing a mysterious photo archive. Look carefully at this photo and write ONE short, absurd, fictional caption (2–3 sentences). Treat everyone in it as complete strangers — invent ridiculous names and a made-up scenario that has absolutely nothing to do with weddings, romance, or formal events. Be deadpan and dry. Examples: "Gerald, seen here moments after accidentally bidding $40,000 on a decorative gourd at auction. His lawyer has advised him not to comment." or "Brenda and Keith, attending what they believed was a free cheese tasting. It was not." Return ONLY the caption — no quotes, no preamble, nothing else.`;

    async function generateCaption(photoId) {
      const photo = photos.find(p => p.id === photoId);
      if (!photo || photo.loading) return;
      const key = apiKeyInput.value.trim();
      if (!key) { alert('Please enter your Gemini API key in the bar at the top.'); return; }

      photo.loading = true;
      photo.error = null;
      setCardBody(photoId, `<div class="loader-row"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`);

      try {
        const res = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${encodeURIComponent(key)}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [
                { inline_data: { mime_type: photo.mimeType, data: photo.base64 } },
                { text: PROMPT }
              ]}],
              generationConfig: { maxOutputTokens: 200, temperature: 1.2 }
            })
          }
        );
        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message || 'Gemini API error');
        const caption = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || 'Caption unavailable.';
        photo.caption = caption;
        photo.loading = false;
        setCardBody(photoId, `
          <div class="caption-area">
            <p class="caption-tag">Archival note</p>
            <p class="caption-text">${escHtml(caption)}</p>
            <button class="regen-btn">↻ Regenerate</button>
          </div>`);
        if (lightbox.classList.contains('open') && lbImg.src === photo.url) {
          lbCaption.textContent = caption;
          lbCaption.style.display = 'block';
        }
      } catch (err) {
        photo.loading = false;
        photo.error = err.message;
        setCardBody(photoId, `<p class="err-text">${escHtml(err.message)}</p><button class="caption-btn">Try again</button>`);
      }
    }

    captionAllBtn.addEventListener('click', async () => {
      if (generatingAll) return;
      generatingAll = true;
      captionAllBtn.disabled = true;
      captionAllBtn.textContent = 'Generating…';
      for (const photo of photos.filter(p => !p.caption && !p.loading)) {
        await generateCaption(photo.id);
      }
      generatingAll = false;
      captionAllBtn.disabled = false;
      captionAllBtn.textContent = '✦ Caption all';
    });

    dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('drag-over'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
    dropzone.addEventListener('drop', (e) => { e.preventDefault(); dropzone.classList.remove('drag-over'); addFiles(e.dataTransfer.files); });
    dropzone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => addFiles(fileInput.files));

    const addMoreInput = document.createElement('input');
    addMoreInput.type = 'file'; addMoreInput.accept = 'image/*'; addMoreInput.multiple = true;
    addMoreInput.style.display = 'none';
    document.body.appendChild(addMoreInput);
    addMoreBtn.addEventListener('click', () => addMoreInput.click());
    addMoreInput.addEventListener('change', () => addFiles(addMoreInput.files));

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    updateUI();
  </script>
</body>
</html>
