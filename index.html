<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E ✦ M · Our Day</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f8f6f3;
      --white: #ffffff;
      --gold: #c9a87c;
      --gold-light: #f2ebe0;
      --ink: #1a1714;
      --ink-mid: #5a5149;
      --ink-soft: #a09080;
      --border: #e8e0d8;
      --shadow-card: 0 2px 16px rgba(0,0,0,0.055);
      --shadow-hover: 0 16px 40px rgba(0,0,0,0.11);
      --radius-card: 20px;
      --radius-pill: 100px;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(248,246,243,0.88);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      padding: 18px 40px;
    }
    .header-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between; gap: 20px;
    }
    .header-left { display: flex; align-items: center; gap: 20px; }
    .monogram {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px; letter-spacing: 0.22em; color: var(--gold);
    }
    .site-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 30px; font-weight: 300; line-height: 1;
    }
    .site-date { font-size: 11px; color: var(--ink-soft); letter-spacing: 0.08em; margin-top: 4px; }

    .btn-primary {
      background: var(--ink); color: var(--white); border: none;
      border-radius: var(--radius-pill); padding: 11px 24px;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
      cursor: pointer; letter-spacing: 0.02em;
      transition: opacity 0.2s, transform 0.15s;
      white-space: nowrap; display: none;
    }
    .btn-primary:hover { opacity: 0.82; transform: scale(1.02); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-primary.visible { display: block; }

    /* ── LOADING / ERROR STATES ── */
    #state-page {
      display: flex; align-items: center; justify-content: center;
      min-height: calc(100vh - 72px); padding: 40px;
      flex-direction: column; gap: 16px; text-align: center;
    }
    .state-icon {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--gold-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; color: var(--gold); margin-bottom: 8px;
    }
    .state-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px; font-weight: 300;
    }
    .state-sub { font-size: 14px; color: var(--ink-soft); line-height: 1.6; max-width: 400px; }
    .state-sub a { color: var(--gold); text-decoration: none; }
    .state-sub a:hover { text-decoration: underline; }

    /* spinner */
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── GALLERY ── */
    #gallery-wrap { display: none; max-width: 1200px; margin: 0 auto; padding: 0 40px 80px; }
    .toolbar { display: flex; align-items: center; gap: 12px; padding: 24px 0 20px; }
    .photo-count { font-size: 13px; color: var(--ink-soft); margin-left: auto; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 22px; }

    /* ── CARD ── */
    .card {
      background: var(--white); border-radius: var(--radius-card);
      overflow: hidden; box-shadow: var(--shadow-card);
      animation: riseIn 0.5s cubic-bezier(.22,1,.36,1) both;
      transition: transform 0.3s cubic-bezier(.22,1,.36,1), box-shadow 0.3s ease;
    }
    .card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); }

    .img-wrap {
      position: relative; aspect-ratio: 4/3;
      overflow: hidden; background: #ede7df; cursor: pointer;
    }
    .img-wrap img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform 0.4s ease;
    }
    .card:hover .img-wrap img { transform: scale(1.03); }
    .img-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.07); opacity: 0; transition: opacity 0.25s;
    }
    .card:hover .img-overlay { opacity: 1; }
    .view-hint {
      position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.5); color: #fff;
      font-size: 11px; letter-spacing: 0.06em;
      padding: 5px 12px; border-radius: 100px;
      opacity: 0; transition: opacity 0.2s;
      white-space: nowrap; pointer-events: none;
    }
    .card:hover .view-hint { opacity: 1; }

    .card-body { padding: 16px 18px 20px; }

    .caption-btn {
      width: 100%; background: var(--gold-light); border: none;
      border-radius: var(--radius-pill); padding: 11px 0;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
      color: #6a4828; cursor: pointer; transition: background 0.2s, transform 0.15s;
    }
    .caption-btn:hover { background: #ecdfc9; transform: scale(1.01); }

    .loader-row { display: flex; gap: 7px; justify-content: center; align-items: center; padding: 10px 0; }
    .dot {
      display: inline-block; width: 7px; height: 7px;
      background: var(--gold); border-radius: 50%;
      animation: pulse 1.1s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }

    .caption-area { animation: fadeUp 0.4s ease both; }
    .caption-tag {
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 9px;
    }
    .caption-text {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 16px; line-height: 1.7; color: #2a2016;
    }
    .regen-btn {
      margin-top: 13px; background: none; border: none;
      font-family: 'DM Sans', sans-serif; font-size: 12px;
      color: var(--ink-soft); cursor: pointer; padding: 0;
      transition: color 0.2s;
    }
    .regen-btn:hover { color: var(--gold); }
    .err-text { font-size: 13px; color: #c0654a; margin-bottom: 9px; }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(20,16,12,0.93); backdrop-filter: blur(10px);
      align-items: center; justify-content: center; padding: 24px;
    }
    #lightbox.open { display: flex; animation: fadeIn 0.22s ease; }
    .lb-inner {
      position: relative; max-width: 920px; width: 100%;
      display: flex; flex-direction: column; align-items: center; gap: 22px;
    }
    .lb-img-wrap { border-radius: 16px; overflow: hidden; max-height: 68vh; display: flex; }
    .lb-img-wrap img { max-width: 100%; max-height: 68vh; object-fit: contain; border-radius: 16px; display: block; }
    .lb-caption {
      font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 18px;
      color: rgba(255,255,255,0.85); text-align: center; line-height: 1.75; max-width: 580px;
      display: none;
    }
    .lb-close {
      position: absolute; top: -14px; right: -14px;
      background: rgba(255,255,255,0.13); color: #fff; border: none;
      border-radius: 50%; width: 36px; height: 36px; font-size: 20px;
      cursor: pointer; transition: background 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .lb-close:hover { background: rgba(255,255,255,0.24); }

    /* ── ANIMATIONS ── */
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(7px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pulse {
      0%, 100% { transform: scale(0.5); opacity: 0.3; }
      50%       { transform: scale(1);   opacity: 1;   }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      header { padding: 16px 20px; }
      .site-title { font-size: 24px; }
      #gallery-wrap { padding: 0 20px 60px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="header-left">
        <span class="monogram">E ✦ M</span>
        <div>
          <h1 class="site-title">Our Day</h1>
          <p class="site-date">October 11, 2025</p>
        </div>
      </div>
      <button class="btn-primary" id="caption-all-btn">✦ Caption all</button>
    </div>
  </header>

  <!-- Loading / error state -->
  <div id="state-page">
    <div class="spinner"></div>
    <p class="state-title" id="state-title">Loading photos…</p>
    <p class="state-sub" id="state-sub"></p>
  </div>

  <!-- Gallery -->
  <div id="gallery-wrap">
    <div class="toolbar">
      <span class="photo-count" id="photo-count"></span>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox">
    <div class="lb-inner">
      <button class="lb-close" id="lb-close">×</button>
      <div class="lb-img-wrap"><img id="lb-img" src="" alt="" /></div>
      <p class="lb-caption" id="lb-caption"></p>
    </div>
  </div>

  <script>
    const photos = [];
    let generatingAll = false;

    const statePage     = document.getElementById('state-page');
    const stateTitle    = document.getElementById('state-title');
    const stateSub      = document.getElementById('state-sub');
    const galleryWrap   = document.getElementById('gallery-wrap');
    const grid          = document.getElementById('grid');
    const photoCount    = document.getElementById('photo-count');
    const captionAllBtn = document.getElementById('caption-all-btn');
    const lightbox      = document.getElementById('lightbox');
    const lbImg         = document.getElementById('lb-img');
    const lbCaption     = document.getElementById('lb-caption');
    const lbClose       = document.getElementById('lb-close');

    // ── LOAD PHOTOS ──
    async function loadPhotos() {
      try {
        const res  = await fetch('/api/photos');
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to load photos');
        if (data.length === 0) {
          showState('📂', 'No photos found', 'Make sure the Drive folder is shared as "Anyone with the link" and contains images.');
          return;
        }
        data.forEach((f, i) => {
          const photo = { id: f.id, mimeType: f.mimeType, thumbnailUrl: f.thumbnailUrl, caption: null, loading: false };
          photos.push(photo);
          renderCard(photo, i);
        });
        statePage.style.display = 'none';
        galleryWrap.style.display = 'block';
        photoCount.textContent = `${photos.length} photo${photos.length !== 1 ? 's' : ''}`;
        captionAllBtn.classList.add('visible');
      } catch (err) {
        showState('⚠️', 'Could not load photos', err.message);
      }
    }

    function showState(icon, title, sub) {
      statePage.style.display = 'flex';
      statePage.innerHTML = `
        <div class="state-icon">${icon}</div>
        <p class="state-title">${title}</p>
        <p class="state-sub">${sub}</p>`;
    }

    // ── RENDER CARD ──
    function renderCard(photo, index) {
      const card = document.createElement('div');
      card.className = 'card';
      card.id = `card-${photo.id}`;
      card.style.animationDelay = `${Math.min(index * 0.04, 0.6)}s`;
      card.innerHTML = `
        <div class="img-wrap">
          <img src="${photo.thumbnailUrl}" alt="" loading="lazy" />
          <div class="img-overlay"></div>
          <span class="view-hint">click to enlarge</span>
        </div>
        <div class="card-body" id="body-${photo.id}">
          <button class="caption-btn">✦ Generate caption</button>
        </div>`;
      grid.appendChild(card);

      card.querySelector('.img-wrap').addEventListener('click', () => openLightbox(photo));
      card.querySelector('.caption-btn').addEventListener('click', () => generateCaption(photo.id));
    }

    function setCardBody(photoId, html) {
      const body = document.getElementById(`body-${photoId}`);
      if (!body) return;
      body.innerHTML = html;
      body.querySelector('.regen-btn')?.addEventListener('click', () => generateCaption(photoId));
      body.querySelector('.caption-btn')?.addEventListener('click', () => generateCaption(photoId));
    }

    // ── LIGHTBOX ──
    function openLightbox(photo) {
      lbImg.src = photo.thumbnailUrl.replace('sz=w600', 'sz=w1200');
      lbCaption.textContent = photo.caption || '';
      lbCaption.style.display = photo.caption ? 'block' : 'none';
      lightbox.classList.add('open');
    }
    lbClose.addEventListener('click', () => lightbox.classList.remove('open'));
    lightbox.addEventListener('click', (e) => { if (e.target === lightbox) lightbox.classList.remove('open'); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') lightbox.classList.remove('open'); });

    // ── GENERATE CAPTION ──
    async function generateCaption(photoId) {
      const photo = photos.find(p => p.id === photoId);
      if (!photo || photo.loading) return;

      photo.loading = true;
      setCardBody(photoId, `<div class="loader-row"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`);

      try {
        const res = await fetch('/api/caption', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fileId: photo.id, mimeType: photo.mimeType })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Caption failed');

        photo.caption = data.caption;
        photo.loading = false;
        setCardBody(photoId, `
          <div class="caption-area">
            <p class="caption-tag">Archival note</p>
            <p class="caption-text">${escHtml(data.caption)}</p>
            <button class="regen-btn">↻ Regenerate</button>
          </div>`);

        if (lightbox.classList.contains('open') && lbImg.src.includes(photo.id)) {
          lbCaption.textContent = data.caption;
          lbCaption.style.display = 'block';
        }
      } catch (err) {
        photo.loading = false;
        setCardBody(photoId, `<p class="err-text">${escHtml(err.message)}</p><button class="caption-btn">Try again</button>`);
      }
    }

    captionAllBtn.addEventListener('click', async () => {
      if (generatingAll) return;
      generatingAll = true;
      captionAllBtn.disabled = true;
      captionAllBtn.textContent = 'Generating…';
      for (const photo of photos.filter(p => !p.caption && !p.loading)) {
        await generateCaption(photo.id);
      }
      generatingAll = false;
      captionAllBtn.disabled = false;
      captionAllBtn.textContent = '✦ Caption all';
    });

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    loadPhotos();
  </script>
</body>
</html>
